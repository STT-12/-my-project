server:
  port: 8088
  servlet:
    context-path: /api

spring:
  datasource:
    url: jdbc:sqlite:bookstore.db
    driver-class-name: org.sqlite.JDBC

# JWT配置
jwt:
  secret: mySecretKeyForJWTTokenGeneration2024SpringBoot355
  expiration: 86400000  # 24小时

# MyBatis 配置
mybatis:
  type-aliases-package: com.example.demo3.entity
  configuration:
    map-underscore-to-camel-case: true

logging:
  level:
    com.example.demo3: DEBUG


file:

    upload-dir: ./uploads/bookstore/